
version: 2

sources:
  - name: raw_pokeapi
    database: airbyte_curso
    schema: main
    description: "Tablas crudas replicadas desde PokeAPI via Airbyte."
    tables:
      - name: pokemon
        description: "Listado de Pokémon (stream pokemon)."

  - name: raw_mysql
    database: airbyte_curso
    schema: main
